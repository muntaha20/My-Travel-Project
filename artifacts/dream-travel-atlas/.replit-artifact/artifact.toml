kind = "web"
previewPath = "/"
title = "Dream Travel Atlas"
version = "1.0.0"
id = "artifacts/dream-travel-atlas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23171

[services.development]
run = "pnpm --filter @workspace/dream-travel-atlas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dream-travel-atlas", "run", "build" ]
publicDir = "artifacts/dream-travel-atlas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23171"
BASE_PATH = "/"
